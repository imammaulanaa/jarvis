apiVersion: jarvis.io/v1
kind: Service

metadata:
  name: Payment Service
  slug: payment-service

spec:
  description: "Handles all payment transactions including cards and e-wallets"
  language: Go
  tier: tier-1
  lifecycle: active

  repo_url:      https://github.com/org/payment-service
  docs_url:      https://docs.internal/payment-service
